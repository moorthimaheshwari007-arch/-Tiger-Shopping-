<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tiger Shopping</title><!-- Firebase --><script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script><script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script><script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js"></script><script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js"></script><style>
body{margin:0;font-family:Arial;background:#f1f3f6}
header{background:#131921;color:#fff;padding:10px}
.container{padding:20px}
.products{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:15px}
.product{background:#fff;padding:10px;border-radius:8px;text-align:center}
.product img{width:100%;height:150px;object-fit:cover}
button{padding:6px;margin:5px;border:none;cursor:pointer}
#cartBox{position:fixed;right:0;top:0;width:320px;height:100%;background:#fff;padding:10px;overflow:auto}
.admin{background:#fff;padding:10px;margin-top:20px;border-radius:8px}
</style></head><body><header>
<h2>🐯 Tiger Shopping</h2>
📞 7810049030, 8220205901 | WhatsApp: <a href="https://wa.me/917810049030" target="_blank">Chat</a>
</header><div class="container"><div id="login">
<input id="email" placeholder="Email"><br><br>
<input id="password" type="password" placeholder="Password"><br><br>
<button onclick="login()">Login</button>
</div><div id="app" style="display:none"><div id="adminPanel" class="admin" style="display:none">
<h3>Add Product</h3>
<input id="name" placeholder="Name">
<input id="price" placeholder="Price">
<input id="file" type="file">
<button onclick="addProduct()">Add</button>
</div><h3>Products</h3>
<div id="product-list" class="products"></div><h3>Track Order</h3>
<input id="trackPhone" placeholder="Enter phone">
<button onclick="trackOrder()">Track</button>
<div id="trackResult"></div><div id="orders"></div></div>
</div><div id="cartBox">
<h3>Cart</h3>
<ul id="cart-items"></ul>
Total ₹<span id="total">0</span>
<input id="phone" placeholder="Phone"><br>
<textarea id="address" placeholder="Address"></textarea>
<button onclick="placeOrder()">Pay & Order</button>
</div><script>
const firebaseConfig={apiKey:"YOUR_KEY",authDomain:"YOUR_DOMAIN",projectId:"YOUR_ID",storageBucket:"YOUR_BUCKET"};
firebase.initializeApp(firebaseConfig);
const db=firebase.firestore();
const auth=firebase.auth();
const storage=firebase.storage();

let cart=[],total=0;

function login(){auth.signInWithEmailAndPassword(email.value,password.value)}

const ADMIN_EMAIL="moorthimaheshwari007@gmail.com";

auth.onAuthStateChanged(user=>{
if(user){
login.style.display="none";
app.style.display="block";
if(user.email===ADMIN_EMAIL){adminPanel.style.display="block";loadOrders();}
}
});

function addProduct(){
let f=file.files[0];
let ref=storage.ref("products/"+f.name);
ref.put(f).then(()=>ref.getDownloadURL().then(url=>{
db.collection("products").add({name:name.value,price:price.value,image:url});
}));
}

db.collection("products").onSnapshot(s=>{
product-list.innerHTML="";
s.forEach(d=>{
let p=d.data();
product-list.innerHTML+=`<div class='product'>
<img src='${p.image}'><h4>${p.name}</h4>
₹${p.price}<br>
<button onclick="addCart('${p.name}',${p.price})">Add</button>
</div>`;
});
});

function addCart(n,p){cart.push({name:n,price:p});total+=+p;
cart-items.innerHTML+=`<li>${n} ₹${p}</li>`;
document.getElementById("total").innerText=total;}

function placeOrder(){
if(cart.length==0||!phone.value||!address.value)return alert("Fill all");

db.collection("orders").add({items:cart,total:total,phone:phone.value,address:address.value,status:"Pending",time:new Date()});

let msg="Hello from Tiger Shopping 🐯%0A%0AOrder:%0A";
cart.forEach(i=>{msg+=i.name+" - ₹"+i.price+"%0A"});
msg+="%0ATotal: ₹"+total+"%0APhone: "+phone.value+"%0AAddress: "+address.value;
window.open("https://wa.me/917810049030?text="+msg);

cart=[];total=0;cart-items.innerHTML="";document.getElementById("total").innerText=0;
}

function loadOrders(){
db.collection("orders").onSnapshot(s=>{
orders.innerHTML="<h3>Orders</h3>";
s.forEach(d=>{
let o=d.data();
orders.innerHTML+=`<div class='admin'>
${o.phone}<br>${o.address}<br>₹${o.total}<br>Status: ${o.status}<br>
<button onclick="updateStatus('${d.id}','Shipped')">Ship</button>
<button onclick="updateStatus('${d.id}','Delivered')">Done</button>
</div>`;
});
});
}

function updateStatus(id,st){db.collection("orders").doc(id).update({status:st})}

function trackOrder(){
db.collection("orders").where("phone","==",trackPhone.value).onSnapshot(s=>{
trackResult.innerHTML="";
s.forEach(d=>{
let o=d.data();
trackResult.innerHTML+=`<div>${o.items.length} items - ₹${o.total} - ${o.status}</div>`;
});
});
}
</script></body>
</html>
