
<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tiger Shopping</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js"></script>

<style>
body{margin:0;font-family:Arial;background:#f1f3f6}
header{background:#131921;color:#fff;padding:10px;display:flex;justify-content:space-between}
.products{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px;padding:10px}
.product{background:#fff;padding:10px;text-align:center;border-radius:8px}
#cartBox{display:none;position:fixed;right:0;top:0;width:300px;height:100%;background:#fff;padding:10px}
button{padding:5px;margin:5px}
</style>
</head>

<body>

<header>
<h3>🐯 Tiger Shopping</h3>
<button onclick="toggleCart()">Cart</button>
</header>

<div id="login">
<input id="email" placeholder="Email"><br><br>
<input id="password" type="password" placeholder="Password"><br><br>
<button onclick="login()">Login</button>
</div>

<div id="app" style="display:none">
<div id="adminPanel" style="display:none">
<input id="name" placeholder="Product">
<input id="price" placeholder="Price">
<input id="file" type="file">
<button onclick="addProduct()">Add</button>
</div>

<div class="products" id="products"></div>
<div id="orders"></div>
</div>

<div id="cartBox">
<h3>Cart</h3>
<ul id="cartItems"></ul>
Total ₹<span id="total">0</span><br>
<input id="phone" placeholder="Phone"><br>
<textarea id="address" placeholder="Address"></textarea><br>
<button onclick="placeOrder()">Order</button>
</div>

<script>
const firebaseConfig={apiKey:"YOUR_KEY",authDomain:"YOUR_DOMAIN",projectId:"YOUR_ID",storageBucket:"YOUR_BUCKET"};
firebase.initializeApp(firebaseConfig);
const db=firebase.firestore();
const auth=firebase.auth();
const storage=firebase.storage();

let cart=[],total=0;
const ADMIN="moorthimaheshwari007@gmail.com";

function login(){auth.signInWithEmailAndPassword(email.value,password.value)}

auth.onAuthStateChanged(u=>{
if(u){login.style.display="none";app.style.display="block";
if(u.email===ADMIN){adminPanel.style.display="block";loadOrders();}
}
});

function addProduct(){
let f=file.files[0];
let ref=storage.ref("products/"+f.name);
ref.put(f).then(()=>ref.getDownloadURL().then(url=>{
db.collection("products").add({name:name.value,price:price.value,image:url});
}));
}

db.collection("products").onSnapshot(s=>{
products.innerHTML="";
s.forEach(d=>{
let p=d.data();
products.innerHTML+=`<div class='product'>
<img src='${p.image}' width='100%'>
<h4>${p.name}</h4>
₹${p.price}<br>
<button onclick="addCart('${p.name}',${p.price})">Add</button>
</div>`;
});
});

function addCart(n,p){
cart.push({name:n,price:p});
total+=+p;
cartItems.innerHTML+=`<li>${n} ₹${p}</li>`;
document.getElementById("total").innerText=total;
}

function toggleCart(){
let c=document.getElementById("cartBox");
c.style.display=c.style.display==="none"?"block":"none";
}

function placeOrder(){
if(!phone.value||!address.value)return alert("Fill details");

db.collection("orders").add({
items:cart,total:total,phone:phone.value,address:address.value,status:"Pending"
});

let msg="Order from Tiger Shopping%0A";
cart.forEach(i=>msg+=i.name+" ₹"+i.price+"%0A");
msg+="Total ₹"+total;
window.open("https://wa.me/917810049030?text="+msg);

cart=[];total=0;cartItems.innerHTML="";document.getElementById("total").innerText=0;
}

function loadOrders(){
db.collection("orders").onSnapshot(s=>{
orders.innerHTML="<h3>Orders</h3>";
s.forEach(d=>{
let o=d.data();
orders.innerHTML+=`<div>${o.phone} - ₹${o.total} - ${o.status}</div>`;
});
});
}
</script>

</body>
</html>
